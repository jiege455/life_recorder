name: Cleanup Old Runs

permissions:
  actions: write
  contents: read

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs and artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "========================================="
          echo "  强力清理旧 Runs 和 Artifacts"
          echo "========================================="

          # 先删除所有artifacts（用gh内置命令）
          echo ""
          echo "--- 第一步：清理 Artifacts ---"
          gh artifact list --limit 100 2>/dev/null | tail -n +2 | awk '{print $1}' | while read aid; do
            echo "🗑️  删除 artifact: $aid"
            gh artifact delete "$aid" --yes --quiet 2>/dev/null || true
          done || echo "没有 artifacts 或已清空"

          # 删除所有已完成的runs，保留最新2个成功的
          echo ""
          echo "--- 第二步：清理旧 Runs ---"
          
          # 获取所有run ID和状态
          gh run list --workflow=build-android.yml --limit 200 --json databaseId,status,conclusion --jq '.[] | "\(.databaseId) \(.status) \(.conclusion)"' > /tmp/runs.txt
          
          TOTAL=$(wc -l < /tmp/runs.txt)
          echo "共找到 $TOTAL 个 runs"

          # 找出要保留的最新2个成功run
          KEEP_IDS=$(grep ' success$' /tmp/runs.txt | head -2 | awk '{print $1}')
          echo "保留的 run IDs: $KEEP_IDS"

          # 删除其他所有run
          DELETED=0
          cat /tmp/runs.txt | while read id status conclusion; do
            if echo "$KEEP_IDS" | grep -q "^${id} "; then
              echo "✅ 保留: $id ($conclusion)"
              continue
            fi
            echo "🗑️  删除 run: $id ($status/$conclusion)"
            gh run delete "$id" --yes --quiet 2>/dev/null || true
            DELETED=$((DELETED + 1))
          done

          rm -f /tmp/runs.txt

          echo ""
          echo "========================================="
          echo "  清理完成！"
          echo "========================================="