name: Cleanup Old Runs

permissions:
  actions: write
  contents: read

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete ALL old runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          echo "========================================="
          echo "       开始强力清理"
          echo "========================================="

          # Step 1: 删除所有artifacts
          echo ""
          echo "[1/3] 清理 Artifacts..."
          gh api "repos/$GH_REPO/actions/artifacts?per_page=100" --jq '.artifacts[].id' | while read aid; do
            [ -z "$aid" ] && continue
            gh api -X DELETE "repos/$GH_REPO/actions/artifacts/$aid" --silent 2>/dev/null && echo "  ✅ 已删 artifact $aid" || true
          done

          # Step 2: 获取运行列表
          echo ""
          echo "[2/3] 获取运行列表..."
          WORKFLOW_ID=$(gh api "repos/$GH_REPO/actions/workflows" --jq '.workflows[] | select(.name=="Build Android APK") | .id')
          echo "Workflow ID: $WORKFLOW_ID"

          PAGE=1
          > /tmp/all_runs.txt
          while true; do
            DATA=$(gh api "repos/$GH_REPO/actions/workflows/$WORKFLOW_ID/runs?per_page=100&page=$PAGE" --jq '.workflow_runs[] | "\(.id) \(.conclusion)"' 2>/dev/null)
            [ -z "$DATA" ] && break
            echo "$DATA" >> /tmp/all_runs.txt
            PAGE=$((PAGE+1))
          done

          TOTAL=$(wc -l < /tmp/all_runs.txt)
          echo "共找到 $TOTAL 条记录"

          # Step 3: 删除旧Runs（保留最新2个成功的）
          echo ""
          echo "[3/3] 删除旧Runs..."
          
          KEEP1=$(grep ' success$' /tmp/all_runs.txt | head -1 | awk '{print $1}')
          KEEP2=$(grep ' success$' /tmp/all_runs.txt | head -2 | tail -1 | awk '{print $1}')
          echo "保留: $KEEP1, $KEEP2"

          cat /tmp/all_runs.txt | while read rid rcon; do
            if [ "$rid" = "$KEEP1" ] || [ "$rid" = "$KEEP2" ]; then
              echo "  ⏭️  保留 $rid ($rcon)"
              continue
            fi
            RESULT=$(gh api -X DELETE "repos/$GH_REPO/actions/runs/$rid" 2>&1)
            if echo "$RESULT" | grep -q '"message"'; then
              echo "  ❌ 失败 $rid: $(echo $RESULT | grep -o '"message":"[^"]*"' | head -1)"
            else
              echo "  🗑️  已删 $rid ($rcon)"
            fi
            sleep 0.5
          done

          rm -f /tmp/all_runs.txt

          echo ""
          echo "========================================="
          echo "       清理完成！"
          echo "========================================="