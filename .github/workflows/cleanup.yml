name: Cleanup Old Runs

permissions:
  actions: write
  contents: read

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs and artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "========================================="
          echo "  开始清理旧 Workflow Runs 和 Artifacts"
          echo "========================================="

          # 获取workflow ID
          WORKFLOW_ID=$(gh api repos/$GITHUB_REPOSITORY/actions/workflows --jq '.workflows[] | select(.name == "Build Android APK") | .id')
          echo "Build Android APK Workflow ID: $WORKFLOW_ID"

          # 获取所有runs
          echo ""
          echo "--- 列出所有 Runs ---"
          RUNS=$(gh api repos/$GITHUB_REPOSITORY/actions/workflows/$WORKFLOW_ID/runs --jq '.workflow_runs[] | "\(.id)|\(.status)|\(.conclusion)|\(.created_at)"' | sort -t'|' -k3)
          
          TOTAL=$(echo "$RUNS" | wc -l)
          echo "共找到 $TOTAL 个 runs"

          # 删除失败的runs，保留最新2个成功的
          echo ""
          echo "--- 开始删除旧 Runs ---"
          SUCCESS_COUNT=0
          DELETED=0

          # 先删除所有失败的runs
          echo "$RUNS" | while IFS='|' read id status conclusion created; do
            if [ "$status" = "completed" ] && [ "$conclusion" = "success" ]; then
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              if [ $SUCCESS_COUNT -le 2 ]; then
                echo "✅ 保留成功 run: $id ($created)"
                continue
              fi
            fi
            
            echo "🗑️  删除 run: $id (状态=$status, 结果=$conclusion, 时间=$created)"
            gh api -X DELETE repos/$GITHUB_REPOSITORY/actions/runs/$id --silent 2>/dev/null || true
            DELETED=$((DELETED + 1))
          done

          # 清理残留的artifacts
          echo ""
          echo "--- 清理残留 Artifacts ---"
          ARTIFACTS=$(gh api repos/$GITHUB_REPOSITORY/actions/artifacts --per_page=100 --jq '.artifacts[] | .id')
          if [ -n "$ARTIFACTS" ]; then
            echo "$ARTIFACTS" | while read aid; do
              echo "🗑️  删除 artifact: $aid"
              gh api -X DELETE repos/$GITHUB_REPOSITORY/actions/artifacts/$aid --silent 2>/dev/null || true
            done
          else
            echo "没有残留 artifacts"
          fi

          echo ""
          echo "========================================="
          echo "  清理完成！"
          echo "========================================="