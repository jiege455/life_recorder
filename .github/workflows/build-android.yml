name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Setup signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using keystore from Secrets"
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
          else
            echo "Generating debug keystore for build"
            keytool -genkey -v \
              -keystore android/app/release.jks \
              -storetype JKS \
              -storepass jiege2026 \
              -alias release \
              -keypass jiege2026 \
              -keyalg RSA \
              -keysize 2048 \
              -validity 36500 \
              -dname "CN=JieGe Network Technology, OU=Development, O=JieGe Network Technology, L=Guangzhou, ST=Guangdong, C=CN"
          fi
      - run: flutter pub get
      - run: flutter build apk --release
        env:
          KEYSTORE_FILE: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
