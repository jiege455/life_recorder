name: life_recorder
description: AI人生记录器 - 记录生活点滴，AI智能打标签
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.0
  path: ^1.8.0
  path_provider: ^2.1.0
  dio: ^5.4.0
  intl: ^0.20.0
  permission_handler: ^11.3.0
  ifly_speech_recognition: ^1.0.5
  fl_chart: ^0.69.0
  table_calendar: ^3.1.2
  shared_preferences: ^2.2.0
  image_picker: ^1.0.0
  share_plus: ^7.2.0
  local_auth: ^2.1.0
  flutter_screen_lock: ^9.0.3
  awesome_notifications: ^0.11.0
  file_picker: ^8.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true