name: life_recorder
description: AI人生记录器 - 记录生活点滴，AI智能打标签
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  riverpod: ^2.4.0
  dio: ^5.4.0
  speech_to_text: ^6.6.0
  intl: ^0.18.0
  flutter_local_notifications: ^16.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
