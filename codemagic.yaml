workflows:
  flutter-project:
    name: Flutter Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      android_sdk: 34
    scripts:
      - name: Get Flutter dependencies
        script: |
          cd $CM_BUILD_DIR
          flutter pub get
      - name: Build debug APK
        script: |
          cd $CM_BUILD_DIR
          flutter build apk --debug --no-codesign
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
